<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager Settings</title>
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body>
  <div class="settings-container">
    <header class="settings-header">
      <h1>Tab Manager Settings</h1>
    </header>

    <main class="settings-content">
      <section class="settings-section">
        <h2>OpenRouter API</h2>
        <div class="form-group">
          <label for="apiKey">API Key</label>
          <input type="password" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off">
          <button id="toggleApiKeyVisibility" class="btn btn-small">Show</button>
        </div>
        <p class="help-text">Get your API key from <a href="https://openrouter.ai/" target="_blank">openrouter.ai</a></p>
        <div id="apiKeyMessage" class="message"></div>
      </section>

      <section class="settings-section">
        <h2>Model Selection</h2>
        <div class="form-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="google/gemma-3-27b-it">Google Gemma 3 27B</option>
            <option value="google/gemma-4-moe">Google Gemma 4 MoE</option>
            <option value="anthropic/claude-3.5-haiku">Anthropic Claude 3.5 Haiku</option>
            <option value="openai/gpt-4o-mini">OpenAI GPT-4o Mini</option>
            <option value="meta-llama/llama-3.3-70b-instruct">Meta Llama 3.3 70B</option>
            <option value="custom">Custom Model</option>
          </select>
        </div>
        <div class="form-group" id="customModelGroup" style="display: none;">
          <label for="customModel">Custom Model ID</label>
          <input type="text" id="customModel" placeholder="e.g., author/model-name">
        </div>
      </section>

      <section class="settings-section">
        <h2>Appearance</h2>
        <div class="form-group">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="system">System</option>
          </select>
        </div>
      </section>

      <section class="settings-section">
        <h2>Auto Refresh</h2>
        <div class="form-group">
          <label for="autoRefreshSelect">Refresh Interval</label>
          <select id="autoRefreshSelect">
            <option value="0">Disabled</option>
            <option value="30">Every 30 seconds</option>
            <option value="60">Every 1 minute</option>
            <option value="300">Every 5 minutes</option>
          </select>
        </div>
      </section>

      <div class="settings-actions">
        <button id="saveSettings" class="btn btn-primary">Save Settings</button>
        <button id="resetSettings" class="btn btn-secondary">Reset to Defaults</button>
      </div>
    </main>
  </div>

  <script src="settings.js"></script>
</body>
</html>

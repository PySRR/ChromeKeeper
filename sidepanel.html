<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <div>
      <h1>Tab Manager</h1>
      <span class="header-stats" id="headerStats">Loading...</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="refresh-btn" id="refreshBtn" title="Refresh tabs">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2v6h-6M3 22v-6h6"/>
          <path d="M21 8A9 9 0 0 0 5.64 3.64L3 6M3 16a9 9 0 0 0 15.36 4.36L21 18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="closeSettings" title="Close settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="settings-content">
      <div class="setting-group">
        <label for="apiKey">OpenRouter API Key</label>
        <input type="password" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off">
        <div class="api-key-status" id="apiKeyStatus"></div>
      </div>
      <div class="setting-group">
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <option value="openai/gpt-4o-mini">GPT-4o mini</option>
          <option value="openai/gpt-4o">GPT-4o</option>
          <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
          <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
          <option value="google/gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="google/gemini-2.0-flash-exp:free">Gemini 2.0 Flash (Free)</option>
          <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
          <option value="mistralai/mistral-large-2411">Mistral Large</option>
          <option value="custom">Custom Model</option>
        </select>
      </div>
      <div class="setting-group hidden" id="customModelGroup">
        <label for="customEndpoint">Custom Model Endpoint</label>
        <input type="text" id="customEndpoint" placeholder="https://api.example.com/v1/chat/completions">
      </div>
      <div class="setting-group">
        <label for="customModelInput">Custom Model ID (if using custom endpoint)</label>
        <input type="text" id="customModelInput" placeholder="model-name">
      </div>
      <div class="setting-group">
        <label for="autoRefresh">Auto-refresh</label>
        <select id="autoRefresh">
          <option value="0">Disabled</option>
          <option value="30000">Every 30 seconds</option>
          <option value="60000">Every 1 minute</option>
          <option value="300000">Every 5 minutes</option>
        </select>
      </div>
    </div>
  </div>

  <!-- AI Summary Panel -->
  <div class="summary-panel" id="summaryPanel">
    <div class="summary-header">
      <h2>AI Summary</h2>
      <button class="icon-btn" id="closeSummary" title="Close summary">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="summary-content">
      <div class="summary-actions">
        <button class="summary-btn" id="summarizeAll">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Summarize all
        </button>
        <button class="summary-btn secondary" id="summarizeGroup" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Summarize group
        </button>
      </div>
      <div class="summary-output" id="summaryOutput">
        <div class="summary-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <path d="M8 10h.01M12 10h.01M16 10h.01"/>
          </svg>
          <p>Select a group and click "Summarize group" or "Summarize all" to get AI-powered summaries of your tabs.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading" id="loadingState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"/>
      </svg>
      <span>Loading tabs...</span>
    </div>
  </div>

  <div class="footer">
    <button class="footer-btn" id="summaryToggle" title="AI Summary">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      AI Summary
    </button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChromeKeeper - Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidepanel-container">
    <!-- Header with title and action buttons -->
    <header class="sidepanel-header">
      <h1>ChromeKeeper</h1>
      <div class="header-actions">
        <button id="refreshBtn" class="btn-icon" title="Refresh tabs">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
        <button id="summarizeAllBtn" class="btn btn-primary" title="Summarize all tabs" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          Summarize All
        </button>
      </div>
    </header>

    <!-- Summary container (shown when summarizing) -->
    <div id="summaryContainer" class="summary-container hidden">
      <div class="summary-header">
        <span>AI Overview</span>
        <button id="closeSummaryBtn" class="btn-icon-small" title="Close summary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div id="summaryContent" class="summary-content">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <span>Generating summary...</span>
        </div>
      </div>
    </div>

    <!-- Domain groups container -->
    <main class="domain-groups-container">
      <div id="domainGroups" class="domain-groups">
        <!-- Groups will be dynamically inserted here -->
      </div>
      <div id="emptyState" class="empty-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        <p>No tabs found</p>
        <p class="empty-state-sub">Open some tabs to get started</p>
      </div>
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Loading tabs...</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="sidepanel-footer">
      <span id="tabCount">0 tabs</span>
      <button id="settingsBtn" class="btn-link">Settings</button>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>

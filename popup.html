<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>Tab Manager</h1>
    </header>

    <section class="quick-actions">
      <button id="openSidePanel" class="btn btn-primary">
        Open Side Panel
      </button>
      <button id="refreshTabs" class="btn">
        Refresh Tabs
      </button>
    </section>

    <section class="api-key-status">
      <p id="apiKeyStatus">Checking API key...</p>
      <button id="openSettings" class="btn btn-link">Configure Settings</button>
    </section>

    <section class="tab-summary">
      <h2>Quick Stats</h2>
      <div id="tabStats" class="stats">
        <p>Loading...</p>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
